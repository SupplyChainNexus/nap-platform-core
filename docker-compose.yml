version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=production
    command: php -S 0.0.0.0:8000 -t public

  worker:
    build: .
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=production
    command: php bin/nap worker --interval=2
