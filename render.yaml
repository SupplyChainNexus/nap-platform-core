services:
  # -------------------------------------------------------------
  # 1. NAP Platform Web API & Admin Dashboard
  # -------------------------------------------------------------
  - type: web
    name: nap-platform-api
    env: docker
    dockerfilePath: Dockerfile
    plan: starter
    region: oregon
    dockerCommand: php -d extension=pdo_sqlite -S 0.0.0.0:8000 -t public
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
    disk:
      name: nap-db-data
      mountPath: /app/data
      sizeGB: 1

  # -------------------------------------------------------------
  # 2. NAP Platform Outbox Background Worker Daemon
  # -------------------------------------------------------------
  - type: worker
    name: nap-platform-worker
    env: docker
    dockerfilePath: Dockerfile
    plan: starter
    region: oregon
    dockerCommand: php -d extension=pdo_sqlite bin/nap worker
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
    disk:
      name: nap-db-data
      mountPath: /app/data
      sizeGB: 1

